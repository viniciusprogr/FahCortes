spring.application.name=fahcortes

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.url=jdbc:mysql://localhost:3306/fahcortes?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.docker.compose.enabled=false

api.security.token.secret=${JWT_SECRET:fahcortes-dev-secret-key-2024-change-in-prod}
api.security.token.expiration=${JWT_EXPIRATION:7200000}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8080}
