version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_fahcortes
    restart: always
    labels:
      org.springframework.boot.jdbc.parameters: "createDatabaseIfNotExist=true"
    environment:
      # Configurações que você já usa no Spring
      MYSQL_DATABASE: fahcortes
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
